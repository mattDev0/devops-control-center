version: '3.8'

services:
  # Rust Agent: High-performance system agent
  agent:
    build:
      context: ./apps/agent
    container_name: devops-agent
    ports:
      - "3011:3001"
    environment:
      - AGENT_SECRET_KEY=${AGENT_SECRET_KEY:-devops-secret-key-123}
    restart: unless-stopped

  # Java Orchestrator: Central coordination layer
  orchestrator:
    build:
      context: ./apps/orchestrator
    container_name: devops-orchestrator
    ports:
      - "8090:8080"
    environment:
      - AGENT_URL=http://devops-agent:3001
      - AGENT_SECRET_KEY=${AGENT_SECRET_KEY:-devops-secret-key-123}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin-password-change-me}
      - JWT_SECRET=${JWT_SECRET:-jwt-signing-secret-key-change-me-should-be-long-and-random-32-bytes}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - agent
    restart: unless-stopped

  # React Frontend: Sleek dashboard (served via Nginx)
  frontend:
    build:
      context: ./apps/frontend
    container_name: devops-frontend
    ports:
      - "8085:80"
    depends_on:
      - orchestrator
      - grafana
    restart: unless-stopped

  # Prometheus server to scrape metrics
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # Grafana dashboard for visualization
  grafana:
    image: grafana/grafana:11.0.0
    container_name: devops-grafana
    ports:
      - "3010:3000"
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Runtime Flags: Use .env variables in production, fallback to local dev defaults
      - GF_SERVER_DOMAIN=${DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:8085/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - GF_SECURITY_COOKIE_SECURE=${COOKIE_SECURE:-false}
      - GF_SERVER_ENFORCE_DOMAIN=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    restart: unless-stopped

  # Node Exporter to gather system metrics
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: devops-node-exporter
    ports:
      - "9101:9100"
    restart: unless-stopped

volumes:
  grafana-data:
