server {
    listen 8080;
    server_name localhost;
    absolute_redirect off;

    # Root for the React app
    location /devops/ {
        alias /usr/share/nginx/html/;
        index index.html index.htm;
        try_files $uri $uri/ /devops/index.html;
    }

    # Proxy API requests
    location /devops/api/ {
        rewrite ^/devops/(.*)$ /$1 break;
        proxy_pass http://devops-orchestrator:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy SSE logs
    location /devops/api/servers/logs {
        rewrite ^/devops/(.*)$ /$1 break;
        proxy_pass http://devops-orchestrator:8080;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy Terminal WebSocket
    location /devops/ws/ {
        rewrite ^/devops/(.*)$ /$1 break;
        proxy_pass http://devops-orchestrator:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 1h;
    }
    
    # Proxy Grafana Live WebSocket
    location /devops/grafana/api/live/ws {
        proxy_pass http://devops-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 1h;
    }

    # Proxy Grafana
    location /devops/grafana/ {
        proxy_pass http://devops-grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Redirect root to /devops/
    location = / {
        return 301 /devops/;
    }
}
