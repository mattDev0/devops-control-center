server {
    listen 80;
    server_name localhost;

    # Root for the React app
    location /devops {
        alias /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /devops/index.html;
    }

    # Redirect root to /devops (optional)
    location = / {
        return 301 /devops/;
    }

    # Proxy API requests to the Java Orchestrator
    location /api/ {
        proxy_pass http://orchestrator:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy SSE logs specifically
    location /api/servers/logs {
        proxy_pass http://orchestrator:8080/api/servers/logs;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
    
    # Proxy Grafana for production access
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
    }
}
