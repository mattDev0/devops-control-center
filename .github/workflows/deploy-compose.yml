name: Production Deployment (Docker Compose)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Agent Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/agent/Dockerfile"
          ignore: DL3008

      - name: Lint Orchestrator Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/orchestrator/Dockerfile"

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/frontend/Dockerfile"

      - name: Set up Go (for Kubeconform)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.6.3

      - name: Run Kubeconform Manifest Validation
        run: |
          ~/go/bin/kubeconform -strict -schema-location default -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' infrastructure/k8s/

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent -> target

      - name: Run Agent Tests
        run: |
          cd apps/agent
          cargo test

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Orchestrator Tests
        run: |
          cd apps/orchestrator
          mvn test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Run Frontend Lint & Build Test
        run: |
          cd apps/frontend
          npm ci
          npm run lint
          npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Devops Agent
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agent
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Devops Agent Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/devops-control-center/devops-agent:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Devops Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./apps/orchestrator
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Devops Orchestrator Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/devops-control-center/devops-orchestrator:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Devops Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Devops Frontend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/devops-control-center/devops-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure via OIDC (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via Azure VM Run Command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az vm run-command invoke \
              --resource-group DEVOPS-LAB-01_GROUP_07122138 \
              --name devops-lab-01 \
              --command-id RunShellScript \
              --scripts "sudo -u matt GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_ACTOR='${{ github.actor }}' COMMIT_SHA='${{ github.sha }}' bash /opt/devops-control-center/scripts/deploy.sh"

