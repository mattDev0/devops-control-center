name: Production Deployment

# Trigger the workflow only when pushing to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your devops-control-center directory
            cd ~/devops-control-center
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            echo "Building Docker images locally..."
            sudo docker build -t devops-agent:latest ./agent
            sudo docker build -t devops-orchestrator:latest ./orchestrator
            sudo docker build -t devops-frontend:latest ./frontend
            
            echo "Importing images into K3s..."
            sudo docker save devops-agent:latest -o /tmp/devops-agent.tar && sudo k3s ctr images import /tmp/devops-agent.tar && rm /tmp/devops-agent.tar
            sudo docker save devops-orchestrator:latest -o /tmp/devops-orchestrator.tar && sudo k3s ctr images import /tmp/devops-orchestrator.tar && rm /tmp/devops-orchestrator.tar
            sudo docker save devops-frontend:latest -o /tmp/devops-frontend.tar && sudo k3s ctr images import /tmp/devops-frontend.tar && rm /tmp/devops-frontend.tar
            
            echo "Applying namespaces..."
            sudo kubectl apply -f k8s/namespace.yaml
            
            echo "Configuring environment secrets..."
            if [ -f ./.env ]; then
              sudo kubectl create secret generic devops-secrets \
                --from-env-file=./.env \
                -n devops \
                --dry-run=client -o yaml | sudo kubectl apply -f -
            fi
            
            echo "Deploying applications and observability to K3s..."
            sudo kubectl apply -f k8s/agent.yaml
            sudo kubectl apply -f k8s/orchestrator.yaml
            sudo kubectl apply -f k8s/frontend.yaml
            sudo kubectl apply -f k8s/prometheus.yaml
            sudo kubectl apply -f k8s/grafana.yaml
            sudo kubectl apply -f k8s/node-exporter.yaml
            
            echo "Triggering rolling restart to pick up new images..."
            sudo kubectl rollout restart deployment/devops-agent deployment/devops-orchestrator deployment/devops-frontend -n devops
            
            # Prune docker images to save space
            sudo docker image prune -f
            
            echo "K8s Deployment successfully executed!"
