name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Agent Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/agent/Dockerfile"
          ignore: DL3008

      - name: Lint Orchestrator Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/orchestrator/Dockerfile"

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "apps/frontend/Dockerfile"

      - name: Set up Go (for Kubeconform)
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.6.3

      - name: Run Kubeconform Manifest Validation
        run: |
          ~/go/bin/kubeconform -strict infrastructure/k8s/

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent -> target

      - name: Run Agent Tests
        run: |
          cd apps/agent
          cargo test

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Orchestrator Tests
        run: |
          cd apps/orchestrator
          mvn test

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Run Frontend Lint & Build Test
        run: |
          cd apps/frontend
          npm ci
          npm run lint
          npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Devops Agent
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agent
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-agent:latest
            ghcr.io/mattdev0/devops-control-center/devops-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Devops Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./apps/orchestrator
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-orchestrator:latest
            ghcr.io/mattdev0/devops-control-center/devops-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Devops Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/mattdev0/devops-control-center/devops-frontend:latest
            ghcr.io/mattdev0/devops-control-center/devops-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your devops-control-center directory
            cd ~/devops-control-center
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            echo "Replacing image tags with Git SHA in manifests..."
            sed -i "s|devops-agent:latest|devops-agent:${{ github.sha }}|g" infrastructure/k8s/agent.yaml
            sed -i "s|devops-orchestrator:latest|devops-orchestrator:${{ github.sha }}|g" infrastructure/k8s/orchestrator.yaml
            sed -i "s|devops-frontend:latest|devops-frontend:${{ github.sha }}|g" infrastructure/k8s/frontend.yaml
            
            echo "Applying namespaces..."
            sudo kubectl apply -f infrastructure/k8s/namespace.yaml
            
            echo "Configuring environment secrets..."
            if [ -f ./.env ]; then
              sudo kubectl create secret generic devops-secrets \
                --from-env-file=./.env \
                -n devops \
                --dry-run=client -o yaml | sudo kubectl apply -f -
            fi
            
            echo "Deploying applications and observability to K3s..."
            sudo kubectl apply -f infrastructure/k8s/network-policies.yaml
            sudo kubectl apply -f infrastructure/k8s/agent.yaml
            sudo kubectl apply -f infrastructure/k8s/orchestrator.yaml
            sudo kubectl apply -f infrastructure/k8s/frontend.yaml
            sudo kubectl apply -f infrastructure/k8s/ingress.yaml
            sudo kubectl apply -f infrastructure/k8s/prometheus.yaml
            sudo kubectl apply -f infrastructure/k8s/grafana.yaml
            sudo kubectl apply -f infrastructure/k8s/node-exporter.yaml
            
            echo "Triggering rolling restart to pick up new images..."
            sudo kubectl rollout restart deployment/devops-agent deployment/devops-orchestrator deployment/devops-frontend -n devops
            
            echo "Waiting for rollouts to complete..."
            sudo kubectl rollout status deployment/devops-agent -n devops --timeout=300s
            sudo kubectl rollout status deployment/devops-orchestrator -n devops --timeout=300s
            sudo kubectl rollout status deployment/devops-frontend -n devops --timeout=300s
            
            # Prune docker images to save space
            sudo docker image prune -f
            
            echo "K8s Deployment successfully executed!"
