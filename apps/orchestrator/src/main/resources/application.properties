spring.application.name=orchestrator

# GitHub Integration
# Set these via environment variables in production:
# GITHUB_OWNER, GITHUB_REPO, GITHUB_TOKEN
github.owner=${GITHUB_OWNER:mattDev0}
github.repo=${GITHUB_REPO:portfolio-monorepo}
github.token=${GITHUB_TOKEN:}

# Agent URL
agent.url=${AGENT_URL:http://localhost:3001}
# Agent Secret Key for Orchestrator -> Agent security
agent.secret-key=${AGENT_SECRET_KEY:devops-secret-key-123}

# Security & Authentication for Frontend -> Orchestrator
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin-password-change-me}
# Secret key for signing JWTs (must be at least 256 bits / 32 characters in production)
jwt.secret=${JWT_SECRET:jwt-signing-secret-key-change-me-should-be-long-and-random-32-bytes}
# JWT token duration (8 hours in milliseconds)
jwt.expiration=28800000
