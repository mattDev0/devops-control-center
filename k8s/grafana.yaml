apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
  namespace: devops
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: cfmh94yfqwjcwd
        type: prometheus
        access: proxy
        url: http://devops-prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          httpMethod: POST
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: devops
data:
  devops.yml: |
    apiVersion: 1
    providers:
      - name: DevOps Control Center
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
---
