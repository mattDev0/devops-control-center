apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-grafana
  namespace: devops
  labels:
    app: devops-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-grafana
  template:
    metadata:
      labels:
        app: devops-grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ALLOW_EMBEDDING
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
        - name: GF_SERVER_DOMAIN
          value: "devops.mattdev0.tech"
        - name: GF_SERVER_ROOT_URL
          value: "https://devops.mattdev0.tech/grafana/"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        - name: GF_SECURITY_COOKIE_SAMESITE
          value: "lax"
        - name: GF_SECURITY_COOKIE_SECURE
          value: "true"
        - name: GF_SERVER_ENFORCE_DOMAIN
          value: "false"
        resources:
          requests:
            memory: "128Mi"
            cpu: "20m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: prov-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: prov-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /etc/grafana/dashboards
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-data-pvc
      - name: prov-datasources
        configMap:
          name: grafana-provisioning-datasources
      - name: prov-dashboards
        configMap:
          name: grafana-provisioning-dashboards
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: devops-grafana
  namespace: devops
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30010
    protocol: TCP
  selector:
    app: devops-grafana
