apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-frontend
  namespace: devops
  labels:
    app: devops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-frontend
  template:
    metadata:
      labels:
        app: devops-frontend
    spec:
      containers:
      - name: devops-frontend
        image: ghcr.io/mattdev0/devops-control-center/devops-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-frontend
  namespace: devops
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30085
    protocol: TCP
  selector:
    app: devops-frontend
